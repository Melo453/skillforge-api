services:
  postgres:
    image: postgres:16
    container_name: skillforge-postgres
    restart: always
    environment:
      POSTGRES_DB: skillforge_db
      POSTGRES_USER: skillforge_user
      POSTGRES_PASSWORD: skillforge_password
    ports:
      - "5432:5432"
    volumes:
      - skillforge_postgres_data:/var/lib/postgresql/data

volumes:
  skillforge_postgres_data: